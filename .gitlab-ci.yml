# Pipeline CI/CD — Registro Municipal
# Etapas: install -> lint -> test -> e2e -> package (build+push imagen)
# El deploy es FUERA DE BANDA: CI publica la imagen en el Container Registry y el
# despliegue se hace en el host con docker compose (ver DEPLOYMENT.md).

stages:
  - install
  - lint
  - test
  - e2e
  - package

default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

variables:
  MONGODB_URI: "mongodb://mongo:27017"
  MONGODB_DB: "registro_test"

install:
  stage: install
  script:
    - npm ci

lint:
  stage: lint
  script:
    - npm run lint

test:
  stage: test
  services:
    - name: mongo:7
      alias: mongo
  script:
    - npm ci
    - npm test

# e2e con Playwright. La imagen DEBE coincidir con la versión de @playwright/test
# del package-lock (actual: 1.61.1); trae los navegadores preinstalados.
# playwright.config.js fuerza MONGODB_DB=registro_e2e, aislando esta BD.
e2e:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.61.1-jammy
  services:
    - name: mongo:7
      alias: mongo
  script:
    - npm ci
    - npx playwright test
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
    expire_in: 1 week

# Construye la imagen de producción para validar el Dockerfile en CI.
# El PUSH está deshabilitado: esta instancia de GitLab NO tiene Container Registry
# (registry.proyectos.codecrypto.academy/v2 -> 404). El despliegue es fuera de banda
# con build local (ver DEPLOYMENT.md). Si se habilita un registry, descomenta el push.
# NOTA: el job NO puede llamarse 'image' (palabra reservada de GitLab).
docker-image:
  stage: package
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  cache: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t "registro-ayuntamiento:$CI_COMMIT_SHA" .
    # Publicación (requiere Container Registry habilitado en la instancia):
    # - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    # - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    # - docker push "$CI_REGISTRY_IMAGE:latest"
